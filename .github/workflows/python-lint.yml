name: Python Lint & Syntax Check

on:
  push:
    paths:
      - "pattern-extraction/**/*.py"
      - "pattern-extraction/requirements.txt"
  pull_request:
    paths:
      - "pattern-extraction/**/*.py"
      - "pattern-extraction/requirements.txt"

jobs:
  ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Run Ruff lint
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "check"
          src: "pattern-extraction/"

      - name: Run Ruff format check
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: "format --check --diff"
          src: "pattern-extraction/"

  pip-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r pattern-extraction/requirements.txt
