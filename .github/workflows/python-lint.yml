name: Python Lint & Syntax Check

on:
  push:
    paths:
      - "pattern-extraction/**/*.py"
      - "pattern-extraction/requirements.txt"
  pull_request:
    paths:
      - "pattern-extraction/**/*.py"
      - "pattern-extraction/requirements.txt"

jobs:
  ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff lint
        run: ruff check pattern-extraction/

      - name: Run Ruff format check
        run: ruff format --check pattern-extraction/

  pip-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r pattern-extraction/requirements.txt
